name: CI/CD Diet Analysis Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # This tags the image with your username and repo name
      tags: |
        ghcr.io/mintchimp/cloudnativeproject/diet-analysis:latest

    - name: Run Smoke Test
      run: |
        docker run --rm ghcr.io/mintchimp/cloudnativeproject/diet-analysis:latest python --version