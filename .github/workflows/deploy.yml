name: Build and Deploy to Azure

on:
  push:
    branches: [ main ]

env:
  AZURE_FUNCTIONAPP_NAME: 'func-dietanalysis-lp-dev'
  PYTHON_VERSION: '3.10'

jobs:
# --- JOB 1: BUILD AND DEPLOY FUNCTIONS ---
build_and_deploy_functions:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # This is MANDATORY for Flex Consumption deployments
        pip install --target="./.python_packages/lib/site-packages" -r requirements.txt

    - name: 'Deploy to Azure Functions'
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_APP_SERVICE_PUBLISH_PROFILE }}
        sku: 'flexconsumption'
        remote-build: false  # Must be false for Flex Consumption
        package: .
        
  # --- JOB 2: BUILD AND DEPLOY STATIC WEB APP ---
  build_and_deploy_swa:
    needs: build_and_deploy_functions
    runs-on: ubuntu-latest
    name: Build and Deploy SWA
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Inject frontend API URL config
        shell: bash
        run: |
          # Use the exact Function App URL
          cat > dashboard/config.js <<EOF
          window.DASHBOARD_CONFIG = {
            apiUrl: "https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api"
          };
          EOF

      - name: Build And Deploy SWA
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_WAVE_00EAECE1E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dashboard" 
          api_location: "" 
          output_location: "" 
          # Crucial: Prevent SWA from creating a "ghost" API
          skip_api_build: true