name: Build and Deploy to Azure Functions

on:
  push:
    branches: [ main ]

env:
  AZURE_FUNCTIONAPP_NAME: 'func-dietanalysis-lp-dev'
  PYTHON_VERSION: '3.10'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We use this specific path so the Azure Function worker can find them
        pip install --target="./.python_packages/lib/site-packages" -r requirements.txt

    - name: Zip artifact for deployment
      run: |
        # Zip everything including the hidden .python_packages folder
        zip -r release.zip . -x "*.git*" "*.github*" "*.venv*"
        
    - name: Upload artifact for deployment job
      # FIXED: Changed azure/upload-artifact to actions/upload-artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-app
        path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Download artifact from build job
      # FIXED: Changed azure/download-artifact to actions/download-artifact
      uses: actions/download-artifact@v4
      with:
        name: python-app

    - name: Unzip artifact
      run: unzip release.zip

    - name: 'Deploy to Azure Functions'
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_APP_SERVICE_PUBLISH_PROFILE }}
        sku: 'flexconsumption'
        remote-build: false # Change this to false
